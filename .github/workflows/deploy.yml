name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

env:
  ACR_REGISTRY: cargocoldchainregistry.azurecr.io
  BACKEND_IMAGE: ai-cargo-backend
  MODEL_IMAGE: ai-cargo-model
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}
  MODEL_APP_NAME: ${{ vars.AZURE_MODEL_APP_NAME }}

jobs:
  # ── Job 1: Build & push both images to ACR ──────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        # Use short SHA so every deploy is traceable back to a commit
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build & push model serving image
        uses: docker/build-push-action@v5
        with:
          context: ./serving
          file: ./serving/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.MODEL_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.MODEL_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.MODEL_IMAGE }}:latest
          cache-to: type=inline

  # ── Job 2: Deploy backend Container App ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: cargocoldchainregistry
          containerAppName: ${{ env.BACKEND_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.build.outputs.image-tag }}

      - name: Verify backend health
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Backend URL: https://$APP_URL"
          # Retry up to 5 times (app may be cold-starting)
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check failed after 5 attempts."
          exit 1

  # ── Job 3: Deploy model serving Container App ────────────────────────────────
  deploy-model:
    name: Deploy Model Serving
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy model to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: cargocoldchainregistry
          containerAppName: ${{ env.MODEL_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_REGISTRY }}/${{ env.MODEL_IMAGE }}:${{ needs.build.outputs.image-tag }}

      - name: Verify model health
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.MODEL_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Model URL: https://$APP_URL"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Model serving healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Model health check failed after 5 attempts."
          exit 1
